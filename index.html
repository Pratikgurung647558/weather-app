<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="weatherForm">
        <input type="text" class="cityInput" placeholder="Enter city name">
        <button type="submit" class="button">Get Weather</button>

    </form>

    <div class="card">
        <h1 class="cityDisplay">Miami</h1>
        <p class="tempDisplay">Temperature: 25°C</p>
        <p class="humidityDisplay">Humidity: 60%</p>
        <p class="descDisplay">Description: Clear sky</p>
        <p class="weatherEmoji">☀️</p>
        <p class="errorDisplay">Please enter a city</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
